<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agile Risk Tracker - Predictive Risk Management</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        /* Include all styles from styles.css here */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #0EA5E9;
            --primary-dark: #0284C7;
            --secondary: #F59E0B;
            --success: #10B981;
            --danger: #EF4444;
            --warning: #F59E0B;
            --dark: #0F172A;
            --dark-light: #1E293B;
            --dark-lighter: #334155;
            --text: #F1F5F9;
            --text-muted: #94A3B8;
            --accent-cyan: #06B6D4;
            --accent-emerald: #10B981;
            --accent-amber: #F59E0B;
        }

        body {
            font-family: 'Sora', sans-serif;
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 50%, #0F172A 100%);
            color: var(--text);
            overflow-x: hidden;
            min-height: 100vh;
        }

        .font-mono { font-family: 'JetBrains Mono', monospace; }

        /* Animated Background */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            animation: float 20s infinite ease-in-out;
        }

        .orb-1 { width: 400px; height: 400px; background: var(--primary); top: -200px; right: -200px; animation-delay: 0s; }
        .orb-2 { width: 500px; height: 500px; background: var(--accent-emerald); bottom: -250px; left: -250px; animation-delay: 5s; }
        .orb-3 { width: 300px; height: 300px; background: var(--accent-cyan); top: 50%; left: 50%; animation-delay: 10s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(100px, -100px) scale(1.1); }
            66% { transform: translate(-100px, 100px) scale(0.9); }
        }

        /* Glass morphism */
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(148, 163, 184, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .glass-light {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(148, 163, 184, 0.1);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--dark); }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary-dark); }

        /* Animations */
        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(14, 165, 233, 0.4); }
            50% { box-shadow: 0 0 40px rgba(14, 165, 233, 0.6); }
        }

        .animate-slide-up { animation: slideInUp 0.6s ease-out forwards; }
        .animate-slide-right { animation: slideInRight 0.6s ease-out forwards; }
        .animate-fade-in { animation: fadeIn 0.8s ease-out forwards; }

        .delay-100 { animation-delay: 0.1s; opacity: 0; }
        .delay-200 { animation-delay: 0.2s; opacity: 0; }
        .delay-300 { animation-delay: 0.3s; opacity: 0; }
        .delay-400 { animation-delay: 0.4s; opacity: 0; }
        .delay-500 { animation-delay: 0.5s; opacity: 0; }

        /* Buttons */
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--accent-cyan));
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(14, 165, 233, 0.4);
        }

        .card-hover {
            transition: all 0.3s ease;
        }

        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        /* Risk badges */
        .risk-critical { background: linear-gradient(135deg, #DC2626, #EF4444); box-shadow: 0 4px 15px rgba(220, 38, 38, 0.4); }
        .risk-high { background: linear-gradient(135deg, #EA580C, #F97316); box-shadow: 0 4px 15px rgba(234, 88, 12, 0.4); }
        .risk-medium { background: linear-gradient(135deg, #D97706, #F59E0B); box-shadow: 0 4px 15px rgba(217, 119, 6, 0.4); }
        .risk-low { background: linear-gradient(135deg, #059669, #10B981); box-shadow: 0 4px 15px rgba(5, 150, 105, 0.4); }

        /* Loading */
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner {
            border: 3px solid rgba(148, 163, 184, 0.3);
            border-top-color: var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        /* Progress bar */
        .progress-bar {
            position: relative;
            height: 8px;
            background: rgba(148, 163, 184, 0.2);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent-cyan));
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        /* Inputs */
        input[type="text"],
        input[type="number"],
        input[type="file"],
        textarea,
        select {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.2);
            color: var(--text);
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1);
        }

        .notification-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--danger);
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            animation: pulse-glow 2s infinite;
        }

        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
        }

        @media (max-width: 768px) {
            .orb-1, .orb-2, .orb-3 { width: 200px; height: 200px; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        // ===========================================
        // CONFIGURATION
        // 🔧 CHANGE THIS TO YOUR BACKEND URL
        // ===========================================
        const CONFIG = {
            API_BASE_URL: 'http://localhost:8000',  // FastAPI default port
            DEBUG: true,
        };

        const log = (...args) => {
            if (CONFIG.DEBUG) console.log('[ART]', ...args);
        };

        const logError = (...args) => {
            console.error('[ART ERROR]', ...args);
        };

        // ===========================================
        // API SERVICE LAYER
        // ===========================================
        const API = {
            request: async (endpoint, options = {}) => {
                const url = `${CONFIG.API_BASE_URL}${endpoint}`;
                const defaultOptions = {
                    headers: { 'Content-Type': 'application/json' },
                };

                const config = { ...defaultOptions, ...options };

                try {
                    log(`API Request: ${options.method || 'GET'} ${url}`);
                    const response = await fetch(url, config);
                    
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }

                    const data = await response.json();
                    log(`API Response:`, data);
                    return data;

                } catch (error) {
                    logError(`API Error (${endpoint}):`, error);
                    throw error;
                }
            },

            get: async (endpoint) => API.request(endpoint, { method: 'GET' }),
            post: async (endpoint, data) => API.request(endpoint, { method: 'POST', body: JSON.stringify(data) }),
            put: async (endpoint, data) => API.request(endpoint, { method: 'PUT', body: JSON.stringify(data) }),
            delete: async (endpoint) => API.request(endpoint, { method: 'DELETE' }),

            upload: async (endpoint, file, fieldName = 'file') => {
                const url = `${CONFIG.API_BASE_URL}${endpoint}`;
                const formData = new FormData();
                formData.append(fieldName, file);

                try {
                    log(`API Upload: POST ${url}`);
                    const response = await fetch(url, { method: 'POST', body: formData });

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }

                    const data = await response.json();
                    log(`API Upload Response:`, data);
                    return data;

                } catch (error) {
                    logError(`API Upload Error (${endpoint}):`, error);
                    throw error;
                }
            },

            // ENDPOINTS - Adjust these to match your backend
            risks: {
                getAll: () => API.get('/api/risks'),
                getById: (id) => API.get(`/api/risks/${id}`),
                create: (data) => API.post('/api/risks', data),
                update: (id, data) => API.put(`/api/risks/${id}`, data),
                delete: (id) => API.delete(`/api/risks/${id}`),
                uploadCSV: (file) => API.upload('/api/risks/upload', file),
                predict: (id) => API.get(`/api/risks/${id}/predict`),
            },

            dashboard: {
                getStats: () => API.get('/api/dashboard/stats'),
                getTrends: () => API.get('/api/dashboard/trends'),
            },

            automation: {
                getAlerts: () => API.get('/api/alerts'),
                configure: (config) => API.post('/api/automation/configure', config),
            },

            healthCheck: async () => {
                try {
                    return await API.get('/health');
                } catch (error) {
                    return { status: 'unhealthy', error: error.message };
                }
            },
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Main App Component
        function App() {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [sidebarOpen, setSidebarOpen] = useState(true);
            const [notifications, setNotifications] = useState(0);

            return (
                <>
                    <div className="animated-bg">
                        <div className="bg-orb orb-1"></div>
                        <div className="bg-orb orb-2"></div>
                        <div className="bg-orb orb-3"></div>
                    </div>

                    <div className="relative z-10">
                        <Header 
                            sidebarOpen={sidebarOpen} 
                            setSidebarOpen={setSidebarOpen}
                            notifications={notifications}
                        />

                        <div className="flex">
                            <Sidebar 
                                activeTab={activeTab} 
                                setActiveTab={setActiveTab}
                                sidebarOpen={sidebarOpen}
                            />

                            <main className={`flex-1 transition-all duration-300 ${sidebarOpen ? 'ml-64' : 'ml-20'} p-6 md:p-8 min-h-screen mt-16`}>
                                <div className="max-w-7xl mx-auto">
                                    {activeTab === 'dashboard' && <Dashboard />}
                                    {activeTab === 'risk-input' && <RiskInput />}
                                    {activeTab === 'risk-assessment' && <RiskAssessment />}
                                    {activeTab === 'automation' && <Automation />}
                                    {activeTab === 'analytics' && <Analytics />}
                                </div>
                            </main>
                        </div>
                    </div>
                </>
            );
        }

        // Header Component
        function Header({ sidebarOpen, setSidebarOpen, notifications }) {
            return (
                <header className="glass fixed top-0 left-0 right-0 z-50 h-16 px-6 flex items-center justify-between animate-slide-up">
                    <div className="flex items-center gap-4">
                        <button 
                            onClick={() => setSidebarOpen(!sidebarOpen)}
                            className="text-text hover:text-primary transition-colors"
                        >
                            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16" />
                            </svg>
                        </button>
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-primary to-accent-cyan flex items-center justify-center">
                                <svg className="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                                </svg>
                            </div>
                            <div>
                                <h1 className="text-xl font-bold text-white">Agile Risk Tracker</h1>
                                <p className="text-xs text-text-muted font-mono">Predictive Risk Management</p>
                            </div>
                        </div>
                    </div>

                    <div className="flex items-center gap-4">
                        <button className="relative text-text-muted hover:text-white transition-colors">
                            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                            </svg>
                            {notifications > 0 && (
                                <span className="notification-badge">{notifications}</span>
                            )}
                        </button>
                        <div className="w-px h-6 bg-gray-700"></div>
                        <div className="flex items-center gap-2">
                            <div className="w-9 h-9 rounded-full bg-gradient-to-br from-accent-emerald to-accent-cyan flex items-center justify-center text-white font-bold text-sm">
                                PM
                            </div>
                            <span className="text-sm font-medium hidden md:block">Project Manager</span>
                        </div>
                    </div>
                </header>
            );
        }

        // Sidebar Component
        function Sidebar({ activeTab, setActiveTab, sidebarOpen }) {
            const menuItems = [
                { id: 'dashboard', icon: '📊', label: 'Dashboard', desc: 'Overview' },
                { id: 'risk-input', icon: '📝', label: 'Risk Input', desc: 'Add Risks' },
                { id: 'risk-assessment', icon: '🎯', label: 'Assessment', desc: 'ML Predictions' },
                { id: 'automation', icon: '🤖', label: 'Automation', desc: 'Alerts' },
                { id: 'analytics', icon: '📈', label: 'Analytics', desc: 'Insights' },
            ];

            return (
                <aside className={`glass fixed left-0 top-16 bottom-0 transition-all duration-300 z-40 ${sidebarOpen ? 'w-64' : 'w-20'} overflow-y-auto animate-slide-right`}>
                    <nav className="p-4 space-y-2">
                        {menuItems.map((item, index) => (
                            <button
                                key={item.id}
                                onClick={() => setActiveTab(item.id)}
                                className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-all duration-300 animate-fade-in delay-${(index + 1) * 100} ${
                                    activeTab === item.id 
                                        ? 'bg-gradient-to-r from-primary to-accent-cyan text-white shadow-lg' 
                                        : 'text-text-muted hover:bg-dark-lighter hover:text-white'
                                }`}
                            >
                                <span className="text-2xl">{item.icon}</span>
                                {sidebarOpen && (
                                    <div className="text-left">
                                        <div className="font-semibold text-sm">{item.label}</div>
                                        <div className="text-xs opacity-70">{item.desc}</div>
                                    </div>
                                )}
                            </button>
                        ))}
                    </nav>
                </aside>
            );
        }

        // Dashboard Component
        function Dashboard() {
            const [stats, setStats] = useState({
                totalRisks: 0,
                criticalRisks: 0,
                averageScore: 0,
                resolved: 0,
                loading: true
            });

            useEffect(() => {
                API.dashboard.getStats()
                    .then(data => {
                        setStats({ ...data, loading: false });
                    })
                    .catch(error => {
                        logError('Error loading dashboard:', error);
                        // Demo data if backend not ready
                        setStats({
                            totalRisks: 24,
                            criticalRisks: 3,
                            averageScore: 6.2,
                            resolved: 18,
                            loading: false
                        });
                    });
            }, []);

            if (stats.loading) {
                return (
                    <div className="flex justify-center items-center h-64">
                        <div className="spinner"></div>
                    </div>
                );
            }

            return (
                <div className="space-y-6">
                    <div className="animate-slide-up">
                        <h2 className="text-3xl font-bold mb-2">Risk Dashboard</h2>
                        <p className="text-text-muted">Real-time sprint risk monitoring and insights</p>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        <StatCard title="Total Risks" value={stats.totalRisks} icon="🎯" delay="100" />
                        <StatCard title="Critical Risks" value={stats.criticalRisks} icon="⚠️" delay="200" />
                        <StatCard title="Avg Risk Score" value={typeof stats.averageScore === 'number' ? stats.averageScore.toFixed(1) : stats.averageScore} icon="📊" delay="300" />
                        <StatCard title="Resolved" value={stats.resolved} icon="✅" delay="400" />
                    </div>

                    <div className="glass rounded-xl p-6 card-hover animate-slide-up delay-500">
                        <h3 className="text-xl font-bold mb-4">Recent Risk Assessments</h3>
                        <RecentRisksList />
                    </div>
                </div>
            );
        }

        function StatCard({ title, value, icon, delay }) {
            return (
                <div className={`glass rounded-xl p-6 card-hover animate-slide-up delay-${delay}`}>
                    <div className="flex items-center justify-between mb-4">
                        <div className="text-3xl">{icon}</div>
                    </div>
                    <div className="text-3xl font-bold mb-1">{value}</div>
                    <div className="text-sm text-text-muted">{title}</div>
                </div>
            );
        }

        function RecentRisksList() {
            const [risks, setRisks] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                API.risks.getAll()
                    .then(data => {
                        setRisks(data.slice(0, 5));
                        setLoading(false);
                    })
                    .catch(error => {
                        logError('Error loading risks:', error);
                        setRisks([
                            { id: 1, title: 'Database migration delay', severity: 'critical', score: 8.5, created_at: '2 hours ago' },
                            { id: 2, title: 'API integration issues', severity: 'high', score: 7.2, created_at: '5 hours ago' },
                        ]);
                        setLoading(false);
                    });
            }, []);

            if (loading) {
                return <div className="text-center py-8"><div className="spinner mx-auto"></div></div>;
            }

            return (
                <div className="space-y-3">
                    {risks.length === 0 ? (
                        <p className="text-center text-text-muted py-8">No risks found. Add some risks to get started!</p>
                    ) : (
                        risks.map((risk) => (
                            <div key={risk.id} className="glass-light rounded-lg p-4 flex items-center justify-between hover:bg-dark-lighter transition-colors">
                                <div className="flex items-center gap-4 flex-1">
                                    <div className={`risk-${risk.severity} px-3 py-1 rounded-full text-xs font-bold text-white uppercase`}>
                                        {risk.severity}
                                    </div>
                                    <div className="flex-1">
                                        <div className="font-semibold">{risk.title}</div>
                                        <div className="text-sm text-text-muted">{risk.created_at}</div>
                                    </div>
                                </div>
                                <div className="text-right">
                                    <div className="text-2xl font-bold">{risk.score}</div>
                                    <div className="text-xs text-text-muted">Risk Score</div>
                                </div>
                            </div>
                        ))
                    )}
                </div>
            );
        }

        // Risk Input Component
        function RiskInput() {
            const [inputMethod, setInputMethod] = useState('form');
            const [formData, setFormData] = useState({
                title: '',
                description: '',
                category: '',
                impact: '',
                probability: ''
            });
            const [file, setFile] = useState(null);
            const [loading, setLoading] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    await API.risks.create(formData);
                    alert('Risk submitted successfully!');
                    setFormData({ title: '', description: '', category: '', impact: '', probability: '' });
                } catch (error) {
                    alert('Error submitting risk. Make sure your backend is running!');
                } finally {
                    setLoading(false);
                }
            };

            const handleFileUpload = async (e) => {
                const uploadedFile = e.target.files[0];
                setFile(uploadedFile);
                setLoading(true);
                try {
                    await API.risks.uploadCSV(uploadedFile);
                    alert('File uploaded successfully!');
                } catch (error) {
                    alert('Error uploading file. Make sure your backend is running!');
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="space-y-6">
                    <div className="animate-slide-up">
                        <h2 className="text-3xl font-bold mb-2">Risk Input Module</h2>
                        <p className="text-text-muted">Add new risks via form or CSV upload</p>
                    </div>

                    <div className="flex gap-4 animate-slide-up delay-100">
                        <button
                            onClick={() => setInputMethod('form')}
                            className={`flex-1 py-3 px-6 rounded-lg font-semibold transition-all ${
                                inputMethod === 'form' ? 'bg-gradient-to-r from-primary to-accent-cyan text-white shadow-lg' : 'glass-light hover:bg-dark-lighter'
                            }`}
                        >
                            📝 Manual Form Entry
                        </button>
                        <button
                            onClick={() => setInputMethod('csv')}
                            className={`flex-1 py-3 px-6 rounded-lg font-semibold transition-all ${
                                inputMethod === 'csv' ? 'bg-gradient-to-r from-primary to-accent-cyan text-white shadow-lg' : 'glass-light hover:bg-dark-lighter'
                            }`}
                        >
                            📂 CSV Upload
                        </button>
                    </div>

                    {inputMethod === 'form' ? (
                        <div className="glass rounded-xl p-8 animate-slide-up delay-200">
                            <form onSubmit={handleSubmit} className="space-y-6">
                                <div>
                                    <label className="block text-sm font-semibold mb-2">Risk Title *</label>
                                    <input
                                        type="text"
                                        value={formData.title}
                                        onChange={(e) => setFormData({...formData, title: e.target.value})}
                                        className="w-full px-4 py-3 rounded-lg"
                                        placeholder="e.g., Database migration delay"
                                        required
                                    />
                                </div>

                                <div>
                                    <label className="block text-sm font-semibold mb-2">Description *</label>
                                    <textarea
                                        value={formData.description}
                                        onChange={(e) => setFormData({...formData, description: e.target.value})}
                                        className="w-full px-4 py-3 rounded-lg h-32"
                                        placeholder="Describe the risk in detail..."
                                        required
                                    ></textarea>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    <div>
                                        <label className="block text-sm font-semibold mb-2">Category *</label>
                                        <select
                                            value={formData.category}
                                            onChange={(e) => setFormData({...formData, category: e.target.value})}
                                            className="w-full px-4 py-3 rounded-lg"
                                            required
                                        >
                                            <option value="">Select category</option>
                                            <option value="technical">Technical</option>
                                            <option value="resource">Resource</option>
                                            <option value="schedule">Schedule</option>
                                            <option value="scope">Scope</option>
                                            <option value="external">External</option>
                                        </select>
                                    </div>

                                    <div>
                                        <label className="block text-sm font-semibold mb-2">Impact *</label>
                                        <select
                                            value={formData.impact}
                                            onChange={(e) => setFormData({...formData, impact: e.target.value})}
                                            className="w-full px-4 py-3 rounded-lg"
                                            required
                                        >
                                            <option value="">Select impact</option>
                                            <option value="1">1 - Minimal</option>
                                            <option value="2">2 - Low</option>
                                            <option value="3">3 - Moderate</option>
                                            <option value="4">4 - High</option>
                                            <option value="5">5 - Critical</option>
                                        </select>
                                    </div>

                                    <div>
                                        <label className="block text-sm font-semibold mb-2">Probability *</label>
                                        <select
                                            value={formData.probability}
                                            onChange={(e) => setFormData({...formData, probability: e.target.value})}
                                            className="w-full px-4 py-3 rounded-lg"
                                            required
                                        >
                                            <option value="">Select probability</option>
                                            <option value="1">1 - Very Unlikely</option>
                                            <option value="2">2 - Unlikely</option>
                                            <option value="3">3 - Possible</option>
                                            <option value="4">4 - Likely</option>
                                            <option value="5">5 - Very Likely</option>
                                        </select>
                                    </div>
                                </div>

                                <button
                                    type="submit"
                                    disabled={loading}
                                    className="w-full btn-primary text-white font-bold py-4 rounded-lg disabled:opacity-50"
                                >
                                    {loading ? 'Submitting...' : '🚀 Submit Risk'}
                                </button>
                            </form>
                        </div>
                    ) : (
                        <div className="glass rounded-xl p-8 animate-slide-up delay-200">
                            <div className="text-center space-y-6">
                                <div className="inline-flex items-center justify-center w-24 h-24 rounded-full bg-gradient-to-br from-primary to-accent-cyan opacity-20">
                                    <svg className="w-12 h-12 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                                    </svg>
                                </div>

                                <div>
                                    <h3 className="text-xl font-bold mb-2">Upload CSV File</h3>
                                    <p className="text-text-muted text-sm">
                                        Upload a CSV file with columns: Title, Description, Category, Impact, Probability
                                    </p>
                                </div>

                                <label className="inline-block">
                                    <input
                                        type="file"
                                        accept=".csv"
                                        onChange={handleFileUpload}
                                        className="hidden"
                                    />
                                    <span className="btn-primary text-white font-bold py-3 px-8 rounded-lg cursor-pointer inline-block">
                                        📂 Choose CSV File
                                    </span>
                                </label>

                                {file && (
                                    <div className="glass-light rounded-lg p-4 inline-block">
                                        <div className="flex items-center gap-3">
                                            <span className="text-2xl">📄</span>
                                            <div className="text-left">
                                                <div className="font-semibold">{file.name}</div>
                                                <div className="text-xs text-text-muted">
                                                    {(file.size / 1024).toFixed(2)} KB
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {loading && (
                                    <div className="flex justify-center">
                                        <div className="spinner"></div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // Risk Assessment Component
        function RiskAssessment() {
            const [risks, setRisks] = useState([]);
            const [selectedRisk, setSelectedRisk] = useState(null);
            const [prediction, setPrediction] = useState(null);
            const [loading, setLoading] = useState(false);

            useEffect(() => {
                API.risks.getAll()
                    .then(data => setRisks(data))
                    .catch(error => {
                        logError('Error loading risks:', error);
                        setRisks([
                            { id: 1, title: 'Database migration delay', category: 'technical' },
                            { id: 2, title: 'API integration issues', category: 'technical' },
                        ]);
                    });
            }, []);

            const handlePredict = async (riskId) => {
                setLoading(true);
                try {
                    const result = await API.risks.predict(riskId);
                    setPrediction(result);
                } catch (error) {
                    logError('Error getting prediction:', error);
                    setPrediction({
                        ml_score: 7.8,
                        historical_score: 7.2,
                        final_score: 7.5,
                        confidence: 0.89,
                        severity: 'high'
                    });
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="space-y-6">
                    <div className="animate-slide-up">
                        <h2 className="text-3xl font-bold mb-2">Risk Assessment & Prediction</h2>
                        <p className="text-text-muted">ML-powered risk scoring with historical analysis</p>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="glass rounded-xl p-6 animate-slide-up delay-100">
                            <h3 className="text-xl font-bold mb-4">📋 Pending Assessments</h3>
                            <div className="space-y-3">
                                {risks.length === 0 ? (
                                    <p className="text-center text-text-muted py-8">No risks available</p>
                                ) : (
                                    risks.map((risk) => (
                                        <div
                                            key={risk.id}
                                            onClick={() => {
                                                setSelectedRisk(risk);
                                                handlePredict(risk.id);
                                            }}
                                            className="glass-light rounded-lg p-4 cursor-pointer hover:bg-dark-lighter transition-all"
                                        >
                                            <div className="font-semibold">{risk.title}</div>
                                            <div className="text-xs text-text-muted uppercase">{risk.category}</div>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>

                        <div className="glass rounded-xl p-6 animate-slide-up delay-200">
                            <h3 className="text-xl font-bold mb-4">🎯 ML Prediction Results</h3>
                            {loading ? (
                                <div className="flex justify-center items-center h-64">
                                    <div className="spinner"></div>
                                </div>
                            ) : prediction ? (
                                <div className="space-y-6">
                                    <div className="text-center">
                                        <div className={`inline-block risk-${prediction.severity} px-8 py-3 rounded-full text-2xl font-bold mb-4`}>
                                            {prediction.final_score}/10
                                        </div>
                                        <div className="text-sm text-text-muted">Final Risk Score</div>
                                    </div>

                                    <div className="space-y-4">
                                        <div className="glass-light rounded-lg p-4">
                                            <div className="flex justify-between items-center mb-2">
                                                <span className="text-sm">ML Prediction</span>
                                                <span className="font-bold font-mono">{prediction.ml_score}/10</span>
                                            </div>
                                            <div className="progress-bar">
                                                <div className="progress-fill" style={{ width: `${prediction.ml_score * 10}%` }}></div>
                                            </div>
                                        </div>

                                        <div className="glass-light rounded-lg p-4">
                                            <div className="flex justify-between items-center mb-2">
                                                <span className="text-sm">Historical Analysis</span>
                                                <span className="font-bold font-mono">{prediction.historical_score}/10</span>
                                            </div>
                                            <div className="progress-bar">
                                                <div className="progress-fill" style={{ width: `${prediction.historical_score * 10}%` }}></div>
                                            </div>
                                        </div>

                                        <div className="glass-light rounded-lg p-4">
                                            <div className="flex justify-between items-center">
                                                <span className="text-sm">Model Confidence</span>
                                                <span className="font-bold text-accent-emerald">{(prediction.confidence * 100).toFixed(0)}%</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                <div className="flex flex-col items-center justify-center h-64 text-text-muted">
                                    <svg className="w-16 h-16 mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                                    </svg>
                                    <p>Select a risk to view ML prediction</p>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // Automation Component
        function Automation() {
            const [threshold, setThreshold] = useState(7);

            return (
                <div className="space-y-6">
                    <div className="animate-slide-up">
                        <h2 className="text-3xl font-bold mb-2">Automation & Alerts</h2>
                        <p className="text-text-muted">Configure automated risk notifications</p>
                    </div>

                    <div className="glass rounded-xl p-6 animate-slide-up delay-100">
                        <h3 className="text-xl font-bold mb-6">⚙️ Automation Settings</h3>
                        
                        <div className="p-4 glass-light rounded-lg">
                            <div className="flex items-center justify-between mb-3">
                                <div className="font-semibold">Risk Score Threshold</div>
                                <div className="text-2xl font-bold font-mono text-primary">{threshold}/10</div>
                            </div>
                            <input
                                type="range"
                                min="1"
                                max="10"
                                value={threshold}
                                onChange={(e) => setThreshold(Number(e.target.value))}
                                className="w-full"
                            />
                            <p className="text-xs text-text-muted mt-2">
                                Risks with scores ≥ {threshold} will trigger automated alerts
                            </p>
                        </div>
                    </div>
                </div>
            );
        }

        // Analytics Component
        function Analytics() {
            return (
                <div className="space-y-6">
                    <div className="animate-slide-up">
                        <h2 className="text-3xl font-bold mb-2">Analytics & Insights</h2>
                        <p className="text-text-muted">Deep dive into risk patterns and sprint performance</p>
                    </div>

                    <div className="glass rounded-xl p-6 card-hover animate-slide-up delay-100">
                        <h3 className="text-lg font-bold mb-4">📊 Risk Distribution</h3>
                        <p className="text-text-muted">Analytics data will be loaded from your backend...</p>
                    </div>
                </div>
            );
        }

        // Render App
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
